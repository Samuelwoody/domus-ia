<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Domus-IA España</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/crm-styles.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'domus-gold': '#d4af37',
                        'domus-accent': '#8b1a1a'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-r from-domus-gold to-domus-accent rounded-xl flex items-center justify-center">
                    <i class="fas fa-home text-white"></i>
                </div>
                <h1 class="text-xl font-bold">Domus-IA CRM</h1>
            </div>
            
            <button onclick="openSofiaChat()" class="bg-gradient-to-r from-domus-gold to-domus-accent text-white px-4 py-2 rounded-lg">
                <i class="fas fa-comment-dots mr-2"></i>
                <span class="hidden sm:inline">Hablar con Sofía</span>
            </button>
        </div>
    </nav>
    
    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="mb-6 border-b">
            <nav class="flex space-x-8">
                <button onclick="switchTab('dashboard')" data-tab="dashboard" class="tab-btn active py-4 border-b-2">
                    <i class="fas fa-chart-line mr-2"></i>Dashboard
                </button>
                <button onclick="switchTab('properties')" data-tab="properties" class="tab-btn py-4 border-b-2">
                    <i class="fas fa-building mr-2"></i>Propiedades
                </button>
                <button onclick="switchTab('contacts')" data-tab="contacts" class="tab-btn py-4 border-b-2">
                    <i class="fas fa-users mr-2"></i>Contactos
                </button>
                <button onclick="switchTab('tasks')" data-tab="tasks" class="tab-btn py-4 border-b-2">
                    <i class="fas fa-tasks mr-2"></i>Tareas
                </button>
            </nav>
        </div>
        
        <div id="tabContent">
            
            <div id="dashboard-tab" class="tab-content active">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <h3 class="text-3xl font-bold" id="stat-properties">0</h3>
                        <p class="text-sm text-gray-600">Propiedades</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <h3 class="text-3xl font-bold" id="stat-contacts">0</h3>
                        <p class="text-sm text-gray-600">Contactos</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <h3 class="text-3xl font-bold" id="stat-tasks">0</h3>
                        <p class="text-sm text-gray-600">Tareas</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <h3 class="text-3xl font-bold" id="stat-value">0€</h3>
                        <p class="text-sm text-gray-600">Valor</p>
                    </div>
                </div>
            </div>
            
            <div id="properties-tab" class="tab-content hidden">
                <div id="propertiesGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="col-span-full text-center py-16">
                        <p class="text-gray-400 mb-4">No hay propiedades</p>
                        <button onclick="openSofiaChat()" class="bg-gradient-to-r from-domus-gold to-domus-accent text-white px-6 py-3 rounded-lg">
                            Hablar con Sofía
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="contacts-tab" class="tab-content hidden">
                <div id="contactsList">
                    <div class="text-center py-16">
                        <p class="text-gray-400">No hay contactos</p>
                    </div>
                </div>
            </div>
            
            <div id="tasks-tab" class="tab-content hidden">
                <div id="tasksList">
                    <div class="text-center py-16">
                        <p class="text-gray-400">No hay tareas</p>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
    
    <script src="js/crm-dashboard.js"></script>
    
</body>
</html>
